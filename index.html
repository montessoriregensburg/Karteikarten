:root {
  --bg: #0f0e0c;
  --bg2: #181713;
  --bg3: #221f19;
  --bg4: #2c2820;
  --border: #3a342a;
  --text: #e8e0d0;
  --text2: #a89880;
  --text3: #6a5e4e;
  --accent: #e8a838;
  --accent2: #c4841c;
  --cream: #f2ead8;
  --green: #4caf7d;
  --red: #c0645a;
  --blue: #5b8fcf;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── SIDEBAR ─────────────────────────────────── */
#sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-style: italic;
  color: var(--accent);
  letter-spacing: 0.02em;
  margin-bottom: 2px;
}

.logo-sub {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.sidebar-section-title {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 16px 20px 8px;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 0 10px 10px;
}

.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.fach-item {
  border-radius: 8px;
  margin-bottom: 4px;
  overflow: hidden;
}

.fach-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text2);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  border-radius: 8px;
  transition: all 0.15s;
  text-align: left;
}

.fach-btn:hover { background: var(--bg3); color: var(--text); }
.fach-btn.active { background: var(--bg4); color: var(--text); }

.fach-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  opacity: 0.85;
}

.fach-name { flex: 1; }

.fach-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
}

.fach-chevron {
  font-size: 10px;
  color: var(--text3);
  transition: transform 0.2s;
}

.fach-btn.open .fach-chevron { transform: rotate(90deg); }

.stapel-list {
  display: none;
  padding: 2px 0 4px 38px;
}

.stapel-list.open { display: block; }

.stapel-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text3);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  border-radius: 6px;
  transition: all 0.15s;
  text-align: left;
}

.stapel-btn:hover { background: var(--bg3); color: var(--text2); }
.stapel-btn.active { color: var(--accent); background: rgba(232,168,56,0.08); }

.stapel-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

.sidebar-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
}

.btn-add-fach {
  width: 100%;
  padding: 8px;
  background: rgba(232,168,56,0.1);
  border: 1px dashed rgba(232,168,56,0.3);
  color: var(--accent);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-add-fach:hover { background: rgba(232,168,56,0.18); }

/* ── MAIN ─────────────────────────────────────── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── TOPBAR ───────────────────────────────────── */
#topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 28px;
  height: 60px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
}

.breadcrumb span { color: var(--text2); }
.breadcrumb .sep { opacity: 0.4; }

.topbar-spacer { flex: 1; }

.stat-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--text2);
}

.stat-chip .dot { width: 6px; height: 6px; border-radius: 50%; }

/* ── CONTENT ──────────────────────────────────── */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 32px 28px;
}

#content::-webkit-scrollbar { width: 6px; }
#content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── HOME VIEW ────────────────────────────────── */
.home-title {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 400;
  margin-bottom: 6px;
  color: var(--cream);
}

.home-sub {
  color: var(--text3);
  font-size: 14px;
  margin-bottom: 36px;
}

.section-label {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 16px;
}

.faecher-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
  margin-bottom: 40px;
}

.fach-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.fach-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-color, var(--accent));
  opacity: 0.7;
}

.fach-card:hover { border-color: var(--card-color, var(--accent)); transform: translateY(-2px); box-shadow: var(--shadow); }

.fach-card-icon {
  font-size: 26px;
  margin-bottom: 12px;
  display: block;
}

.fach-card-name {
  font-weight: 600;
  font-size: 16px;
  color: var(--cream);
  margin-bottom: 4px;
}

.fach-card-meta {
  font-size: 12px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  margin-bottom: 14px;
}

.fach-card-progress {
  height: 4px;
  background: var(--bg4);
  border-radius: 2px;
  overflow: hidden;
}

.fach-card-progress-bar {
  height: 100%;
  border-radius: 2px;
  background: var(--card-color, var(--accent));
  opacity: 0.6;
  transition: width 0.4s;
}

/* ── STAPEL VIEW ──────────────────────────────── */
.view-header {
  display: flex;
  align-items: flex-end;
  gap: 20px;
  margin-bottom: 28px;
}

.view-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--cream);
  flex: 1;
}

.view-desc {
  font-size: 13px;
  color: var(--text3);
  margin-top: 4px;
}

.btn {
  padding: 9px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}

.btn-primary {
  background: var(--accent);
  color: #1a1200;
}

.btn-primary:hover { background: var(--accent2); }

.btn-ghost {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
}

.btn-ghost:hover { background: var(--bg4); color: var(--text); }

.stapel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
  margin-bottom: 40px;
}

.stapel-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
}

.stapel-card:hover { border-color: rgba(232,168,56,0.4); transform: translateY(-2px); box-shadow: var(--shadow); }

.stapel-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 10px;
}

.stapel-card-name {
  font-weight: 600;
  font-size: 15px;
  color: var(--cream);
}

.badge {
  padding: 3px 9px;
  border-radius: 12px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  background: var(--bg4);
  color: var(--text3);
  white-space: nowrap;
}

.stapel-card-desc {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 16px;
  line-height: 1.5;
}

.stapel-card-stats {
  display: flex;
  gap: 16px;
}

.stat-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-val {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
}

.stat-lbl {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── KARTEIKARTEN VIEW ────────────────────────── */
.karten-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}

.progress-bar-wrap {
  flex: 1;
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: var(--green);
  border-radius: 3px;
  transition: width 0.4s;
}

.progress-text {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text3);
  white-space: nowrap;
}

/* Lern-Modus */
#lern-modus {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 40px;
}

.karte-scene {
  width: 100%;
  max-width: 640px;
  perspective: 1200px;
  margin-bottom: 28px;
  cursor: pointer;
}

.karte-inner {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
}

.karte-inner.flipped { transform: rotateY(180deg); }

.karte-face {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 36px 40px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.karte-front {
  background: var(--bg2);
  border: 1px solid var(--border);
}

.karte-back {
  background: var(--bg3);
  border: 1px solid rgba(232,168,56,0.25);
  transform: rotateY(180deg);
}

.karte-label {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 16px;
}

.karte-text {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--cream);
  line-height: 1.5;
}

.karte-back .karte-text {
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 400;
  white-space: pre-line;
}

.karte-hint {
  margin-top: 20px;
  font-size: 12px;
  color: var(--text3);
  font-style: italic;
}

.karte-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 16px;
}

.tag {
  padding: 3px 9px;
  background: var(--bg4);
  border-radius: 10px;
  font-size: 11px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
}

.schwierigkeit-dots {
  display: flex;
  gap: 4px;
  margin-top: 12px;
}

.schwierigkeit-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
}

.schwierigkeit-dot.active { background: var(--accent); }

.karten-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.karten-nav .btn { min-width: 120px; }

.lern-counter {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text3);
  min-width: 80px;
  text-align: center;
}

.action-row {
  display: flex;
  gap: 10px;
}

.btn-richtig {
  background: rgba(76,175,125,0.15);
  border: 1px solid rgba(76,175,125,0.35);
  color: var(--green);
  padding: 10px 28px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-richtig:hover { background: rgba(76,175,125,0.25); }

.btn-falsch {
  background: rgba(192,100,90,0.12);
  border: 1px solid rgba(192,100,90,0.3);
  color: var(--red);
  padding: 10px 28px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-falsch:hover { background: rgba(192,100,90,0.22); }

/* Karten-Liste */
.karten-liste {
  display: grid;
  gap: 10px;
}

.karte-list-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  cursor: pointer;
  transition: all 0.15s;
}

.karte-list-item:hover { border-color: var(--border); background: var(--bg3); }

.karte-list-item.gelernt { border-left: 3px solid var(--green); }

.karte-list-frage {
  flex: 1;
  font-size: 14px;
  color: var(--text);
  font-family: 'Playfair Display', serif;
}

.karte-list-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  flex-shrink: 0;
}

/* Ergebnis */
.ergebnis-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px;
  text-align: center;
  max-width: 500px;
  margin: 0 auto;
}

.ergebnis-zahl {
  font-family: 'Playfair Display', serif;
  font-size: 72px;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 8px;
}

.ergebnis-label {
  font-size: 14px;
  color: var(--text3);
  margin-bottom: 32px;
}

.ergebnis-row {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 32px;
}

/* ── MODALS ───────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 480px;
  max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  transform: translateY(12px);
  transition: transform 0.2s;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  margin-bottom: 20px;
  color: var(--cream);
}

.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

.form-input, .form-textarea, .form-select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.15s;
  resize: vertical;
}

.form-input:focus, .form-textarea:focus, .form-select:focus {
  border-color: var(--accent);
}

.form-textarea { min-height: 100px; }
.form-select option { background: var(--bg2); }

.color-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.color-swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.15s;
}

.color-swatch.selected { border-color: white; transform: scale(1.15); }

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 24px;
}

/* ── ANIMATIONS ───────────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in { animation: fadeIn 0.25s ease forwards; }

/* ── EMPTY STATE ──────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.4;
}

.empty-text { font-size: 15px; margin-bottom: 8px; color: var(--text2); }
.empty-sub { font-size: 13px; }

/* Tab-Bar */
.tab-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 4px;
  border-radius: 10px;
  width: fit-content;
}

.tab-btn {
  padding: 7px 18px;
  border-radius: 7px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text3);
  transition: all 0.15s;
}

.tab-btn.active { background: var(--bg4); color: var(--text); }
.tab-btn:hover:not(.active) { color: var(--text2); }

/* Keyboard hint */
.kbd {
  display: inline-block;
  padding: 2px 6px;
  background: var(--bg4);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--text3);
}

.shortcuts-row {
  display: flex;
  gap: 14px;
  justify-content: center;
  margin-top: 4px;
}

.shortcut {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text3);
}

      <label class="form-label">Name</label>
      <input class="form-input" id="fach-name-input" placeholder="z.B. Physik" />
    </div>
    <div class="form-group">
      <label class="form-label">Symbol</label>
      <input class="form-input" id="fach-icon-input" placeholder="z.B. ⚛ oder ein Buchstabe" maxlength="4" />
    </div>
    <div class="form-group">
      <label class="form-label">Farbe</label>
      <div class="color-row" id="color-picker"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-fach')">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveFach()">Erstellen</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-stapel">
  <div class="modal">
    <div class="modal-title">Neuen Stapel erstellen</div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="stapel-name-input" placeholder="z.B. Kapitel 3 – Quantenmechanik" />
    </div>
    <div class="form-group">
      <label class="form-label">Beschreibung</label>
      <input class="form-input" id="stapel-desc-input" placeholder="Kurze Beschreibung…" />
    </div>
    <div class="form-group">
      <label class="form-label">Fach</label>
      <select class="form-select" id="stapel-fach-select"></select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-stapel')">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveStapel()">Erstellen</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-karte">
  <div class="modal">
    <div class="modal-title" id="modal-karte-title">Neue Karteikarte</div>
    <div class="form-group">
      <label class="form-label">Frage / Vorderseite</label>
      <textarea class="form-textarea" id="karte-frage-input" placeholder="Was steht auf der Vorderseite?"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Antwort / Rückseite</label>
      <textarea class="form-textarea" id="karte-antwort-input" placeholder="Was steht auf der Rückseite?"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Tags (kommagetrennt)</label>
      <input class="form-input" id="karte-tags-input" placeholder="z.B. Grundlagen, Kapitel 1" />
    </div>
    <div class="form-group">
      <label class="form-label">Schwierigkeit</label>
      <select class="form-select" id="karte-schwierigkeit">
        <option value="1">★ Sehr leicht</option>
        <option value="2" selected>★★ Leicht</option>
        <option value="3">★★★ Mittel</option>
        <option value="4">★★★★ Schwer</option>
        <option value="5">★★★★★ Sehr schwer</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-karte')">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveKarte()">Speichern</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let data = { faecher: [] };
let currentFachId = null;
let currentStapelId = null;
let lernIndex = 0;
let lernKarten = [];
let lernScore = { richtig: 0, falsch: 0 };
let isFlipped = false;
let editKarteId = null;
let selectedColor = '#e8a838';
let currentView = 'home'; // home | fach | stapel | lernen

const COLORS = ['#e8a838','#4caf7d','#c0645a','#5b8fcf','#9b7ed4','#5ba8a0','#d47e5b','#a0b85c'];

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function init() {
  try {
    const resp = await fetch('karteikartenarchiv.json');
    if (!resp.ok) throw new Error('JSON nicht gefunden');
    data = await resp.json();
  } catch(e) {
    data = { faecher: [] };
    console.warn('JSON konnte nicht geladen werden, starte leer.', e);
  }
  buildSidebar();
  renderHome();
  buildColorPicker();
}

function buildColorPicker() {
  const cp = document.getElementById('color-picker');
  cp.innerHTML = COLORS.map(c =>
    `<div class="color-swatch${c===selectedColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
}

function selectColor(c) {
  selectedColor = c;
  document.querySelectorAll('.color-swatch').forEach(el => {
    el.classList.toggle('selected', el.style.background === c || el.style.background === hexToRgb(c));
  });
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

// ══════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════
function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';

  data.faecher.forEach(fach => {
    const totalKarten = fach.stapel.reduce((acc, s) => acc + s.karten.length, 0);
    const gelernteKarten = fach.stapel.reduce((acc, s) => acc + s.karten.filter(k=>k.gelernt).length, 0);

    const div = document.createElement('div');
    div.className = 'fach-item';
    div.id = `fach-item-${fach.id}`;

    div.innerHTML = `
      <button class="fach-btn${currentFachId===fach.id?' active':''}" onclick="toggleFachSidebar('${fach.id}')">
        <div class="fach-icon" style="background:${fach.farbe}22;color:${fach.farbe}">${fach.icon}</div>
        <span class="fach-name">${fach.name}</span>
        <span class="fach-count">${totalKarten}</span>
        <span class="fach-chevron">▶</span>
      </button>
      <div class="stapel-list${currentFachId===fach.id?' open':''}" id="stapel-list-${fach.id}">
        ${fach.stapel.map(s=>`
          <button class="stapel-btn${currentStapelId===s.id?' active':''}" onclick="showStapel('${fach.id}','${s.id}')">
            <span class="stapel-dot"></span>${s.name}
          </button>
        `).join('')}
      </div>
    `;
    nav.appendChild(div);
  });

  updateTopbarStat();
}

function toggleFachSidebar(fachId) {
  const list = document.getElementById(`stapel-list-${fachId}`);
  const btn = list.previousElementSibling;
  const isOpen = list.classList.contains('open');

  document.querySelectorAll('.stapel-list').forEach(l => l.classList.remove('open'));
  document.querySelectorAll('.fach-btn').forEach(b => b.classList.remove('open', 'active'));

  if (!isOpen) {
    list.classList.add('open');
    btn.classList.add('open', 'active');
    showFach(fachId);
  } else {
    renderHome();
  }
}

function updateTopbarStat() {
  const total = data.faecher.reduce((a,f)=>a+f.stapel.reduce((b,s)=>b+s.karten.length,0),0);
  const gelernt = data.faecher.reduce((a,f)=>a+f.stapel.reduce((b,s)=>b+s.karten.filter(k=>k.gelernt).length,0),0);
  document.getElementById('topbar-stat-text').textContent = `${gelernt}/${total} gelernt`;
}

// ══════════════════════════════════════════════
// VIEWS
// ══════════════════════════════════════════════
function setBreadcrumb(parts) {
  document.getElementById('breadcrumb').innerHTML = parts.map((p,i)=>
    i < parts.length-1
      ? `<span style="cursor:pointer;text-decoration:underline;opacity:0.6" onclick="${p.onclick}">${p.label}</span><span class="sep">›</span>`
      : `<span>${p.label}</span>`
  ).join('');
}

function renderHome() {
  currentFachId = null; currentStapelId = null; currentView = 'home';
  setBreadcrumb([{label:'Übersicht'}]);
  document.querySelectorAll('.fach-btn').forEach(b=>b.classList.remove('active','open'));
  document.querySelectorAll('.stapel-list').forEach(l=>l.classList.remove('open'));
  document.querySelectorAll('.stapel-btn').forEach(b=>b.classList.remove('active'));

  const total = data.faecher.reduce((a,f)=>a+f.stapel.reduce((b,s)=>b+s.karten.length,0),0);
  const gelernt = data.faecher.reduce((a,f)=>a+f.stapel.reduce((b,s)=>b+s.karten.filter(k=>k.gelernt).length,0),0);

  let html = `
    <div class="fade-in">
      <div class="home-title">Willkommen zurück</div>
      <div class="home-sub">${data.faecher.length} Fächer · ${total} Karten · ${gelernt} gelernt</div>
      <div class="section-label">Alle Fächer</div>
      <div class="faecher-grid">
  `;

  if (data.faecher.length === 0) {
    html += `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📚</div>
      <div class="empty-text">Noch keine Fächer vorhanden</div>
      <div class="empty-sub">Erstelle dein erstes Fach mit dem Button unten links.</div>
    </div>`;
  } else {
    data.faecher.forEach(fach => {
      const totalK = fach.stapel.reduce((a,s)=>a+s.karten.length,0);
      const gelernteK = fach.stapel.reduce((a,s)=>a+s.karten.filter(k=>k.gelernt).length,0);
      const pct = totalK > 0 ? Math.round(gelernteK/totalK*100) : 0;
      html += `
        <div class="fach-card" style="--card-color:${fach.farbe}" onclick="showFach('${fach.id}')">
          <span class="fach-card-icon">${fach.icon}</span>
          <div class="fach-card-name">${fach.name}</div>
          <div class="fach-card-meta">${fach.stapel.length} Stapel · ${totalK} Karten · ${pct}%</div>
          <div class="fach-card-progress"><div class="fach-card-progress-bar" style="width:${pct}%"></div></div>
        </div>
      `;
    });
  }

  html += `</div></div>`;
  document.getElementById('content').innerHTML = html;
}

function showFach(fachId) {
  currentFachId = fachId; currentStapelId = null; currentView = 'fach';
  const fach = data.faecher.find(f=>f.id===fachId);
  if (!fach) return;

  setBreadcrumb([
    {label:'Übersicht', onclick:"renderHome()"},
    {label: fach.name}
  ]);

  document.querySelectorAll('.fach-btn').forEach(b=>b.classList.remove('active','open'));
  document.querySelectorAll('.stapel-list').forEach(l=>l.classList.remove('open'));
  const btn = document.querySelector(`#fach-item-${fachId} .fach-btn`);
  const list = document.getElementById(`stapel-list-${fachId}`);
  if (btn) btn.classList.add('active', 'open');
  if (list) list.classList.add('open');

  let html = `<div class="fade-in">
    <div class="view-header">
      <div>
        <div class="view-title">${fach.icon} ${fach.name}</div>
        <div class="view-desc">${fach.stapel.length} Lernstapel · ${fach.stapel.reduce((a,s)=>a+s.karten.length,0)} Karten gesamt</div>
      </div>
      <button class="btn btn-primary" onclick="openAddStapelModal('${fachId}')">+ Neuer Stapel</button>
    </div>
    <div class="section-label">Lernstapel</div>
    <div class="stapel-grid">`;

  if (fach.stapel.length === 0) {
    html += `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🗂</div>
      <div class="empty-text">Noch keine Stapel in diesem Fach</div>
      <div class="empty-sub">Erstelle deinen ersten Lernstapel.</div>
    </div>`;
  } else {
    fach.stapel.forEach(stapel => {
      const total = stapel.karten.length;
      const gelernt = stapel.karten.filter(k=>k.gelernt).length;
      html += `
        <div class="stapel-card" onclick="showStapel('${fachId}','${stapel.id}')">
          <div class="stapel-card-header">
            <div class="stapel-card-name">${stapel.name}</div>
            <span class="badge">${total} Karten</span>
          </div>
          <div class="stapel-card-desc">${stapel.beschreibung || ''}</div>
          <div class="stapel-card-stats">
            <div class="stat-item"><div class="stat-val" style="color:var(--green)">${gelernt}</div><div class="stat-lbl">Gelernt</div></div>
            <div class="stat-item"><div class="stat-val" style="color:var(--red)">${total-gelernt}</div><div class="stat-lbl">Offen</div></div>
            <div class="stat-item"><div class="stat-val">${total > 0 ? Math.round(gelernt/total*100) : 0}%</div><div class="stat-lbl">Fortschritt</div></div>
          </div>
        </div>`;
    });
  }

  html += `</div></div>`;
  document.getElementById('content').innerHTML = html;
  updateTopbarStat();
}

function showStapel(fachId, stapelId, tab='liste') {
  currentFachId = fachId; currentStapelId = stapelId; currentView = 'stapel';
  const fach = data.faecher.find(f=>f.id===fachId);
  const stapel = fach?.stapel.find(s=>s.id===stapelId);
  if (!fach || !stapel) return;

  setBreadcrumb([
    {label:'Übersicht', onclick:"renderHome()"},
    {label: fach.name, onclick:`showFach('${fachId}')`},
    {label: stapel.name}
  ]);

  document.querySelectorAll('.stapel-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.querySelector(`#stapel-list-${fachId} .stapel-btn[onclick*="${stapelId}"]`);
  if(btn) btn.classList.add('active');

  const total = stapel.karten.length;
  const gelernt = stapel.karten.filter(k=>k.gelernt).length;

  let html = `<div class="fade-in">
    <div class="view-header">
      <div>
        <div class="view-title">${stapel.name}</div>
        <div class="view-desc">${stapel.beschreibung || ''}</div>
      </div>
      <button class="btn btn-primary" onclick="startLernen('${fachId}','${stapelId}')">▶ Lernen</button>
      <button class="btn btn-ghost" onclick="openAddKarteModal('${fachId}','${stapelId}')">+ Karte</button>
    </div>
    <div class="tab-bar">
      <button class="tab-btn${tab==='liste'?' active':''}" onclick="showStapel('${fachId}','${stapelId}','liste')">Alle Karten</button>
      <button class="tab-btn${tab==='offen'?' active':''}" onclick="showStapel('${fachId}','${stapelId}','offen')">Offen (${total-gelernt})</button>
      <button class="tab-btn${tab==='gelernt'?' active':''}" onclick="showStapel('${fachId}','${stapelId}','gelernt')">Gelernt (${gelernt})</button>
    </div>`;

  const filter = tab === 'offen' ? k=>!k.gelernt : tab === 'gelernt' ? k=>k.gelernt : ()=>true;
  const filtered = stapel.karten.filter(filter);

  if (filtered.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">🃏</div><div class="empty-text">Keine Karten hier</div></div>`;
  } else {
    html += `<div class="karten-liste">`;
    filtered.forEach((k,i) => {
      const dots = Array.from({length:5},(_,idx)=>`<div class="schwierigkeit-dot${idx<k.schwierigkeit?' active':''}"></div>`).join('');
      html += `
        <div class="karte-list-item${k.gelernt?' gelernt':''}" onclick="editKarte('${fachId}','${stapelId}','${k.id}')">
          <div style="flex:1">
            <div class="karte-list-frage">${k.frage}</div>
            ${k.tags?.length ? `<div class="karte-tags" style="margin-top:8px">${k.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
          </div>
          <div class="karte-list-meta">
            <div class="schwierigkeit-dots">${dots}</div>
            ${k.gelernt ? `<span class="badge" style="color:var(--green);border-color:rgba(76,175,125,0.3)">✓ Gelernt</span>` : ''}
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

// ══════════════════════════════════════════════
// LERN-MODUS
// ══════════════════════════════════════════════
function startLernen(fachId, stapelId, nurOffene=false) {
  const fach = data.faecher.find(f=>f.id===fachId);
  const stapel = fach?.stapel.find(s=>s.id===stapelId);
  if (!stapel) return;

  currentView = 'lernen';
  lernKarten = nurOffene
    ? [...stapel.karten.filter(k=>!k.gelernt)]
    : [...stapel.karten];

  // Mischen
  for (let i = lernKarten.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [lernKarten[i],lernKarten[j]] = [lernKarten[j],lernKarten[i]];
  }

  lernIndex = 0;
  lernScore = {richtig:0, falsch:0};
  isFlipped = false;

  setBreadcrumb([
    {label:'Übersicht', onclick:"renderHome()"},
    {label: fach.name, onclick:`showFach('${fachId}')`},
    {label: stapel.name, onclick:`showStapel('${fachId}','${stapelId}')`},
    {label:'Lernen'}
  ]);

  if (lernKarten.length === 0) {
    document.getElementById('content').innerHTML = `
      <div class="ergebnis-box fade-in">
        <div style="font-size:48px;margin-bottom:12px">🎉</div>
        <div style="font-family:'Playfair Display',serif;font-size:22px;color:var(--cream);margin-bottom:8px">Alle Karten gelernt!</div>
        <div style="color:var(--text3);margin-bottom:24px">Dieser Stapel hat keine offenen Karten mehr.</div>
        <button class="btn btn-ghost" onclick="showStapel('${fachId}','${stapelId}')">Zurück zum Stapel</button>
      </div>`;
    return;
  }

  renderLernKarte(fachId, stapelId);
}

function renderLernKarte(fachId, stapelId) {
  if (lernIndex >= lernKarten.length) {
    renderErgebnis(fachId, stapelId);
    return;
  }

  const k = lernKarten[lernIndex];
  const pct = Math.round(lernIndex/lernKarten.length*100);
  isFlipped = false;

  document.getElementById('content').innerHTML = `
    <div id="lern-modus" class="fade-in">
      <div class="karten-header" style="width:100%;max-width:640px">
        <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px" onclick="showStapel('${fachId}','${stapelId}')">✕ Beenden</button>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="progress-text">${lernIndex+1} / ${lernKarten.length}</div>
      </div>

      <div class="karte-scene" onclick="flipKarte()">
        <div class="karte-inner" id="karte-inner">
          <div class="karte-face karte-front">
            <div class="karte-label">Frage</div>
            <div class="karte-text">${k.frage}</div>
            <div class="schwierigkeit-dots">
              ${Array.from({length:5},(_,i)=>`<div class="schwierigkeit-dot${i<k.schwierigkeit?' active':''}"></div>`).join('')}
            </div>
            <div class="karte-hint">Zum Umdrehen klicken</div>
          </div>
          <div class="karte-face karte-back">
            <div class="karte-label">Antwort</div>
            <div class="karte-text">${k.antwort}</div>
            ${k.tags?.length ? `<div class="karte-tags">${k.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
          </div>
        </div>
      </div>

      <div class="karten-nav">
        <button class="btn btn-ghost" onclick="prevKarte('${fachId}','${stapelId}')">← Zurück</button>
        <div class="lern-counter">✓ ${lernScore.richtig} · ✗ ${lernScore.falsch}</div>
        <button class="btn btn-ghost" onclick="skipKarte('${fachId}','${stapelId}')">Überspringen →</button>
      </div>

      <div class="action-row">
        <button class="btn-falsch" onclick="wertung('${fachId}','${stapelId}',false)">✗ Falsch</button>
        <button class="btn-richtig" onclick="wertung('${fachId}','${stapelId}',true)">✓ Richtig</button>
      </div>

      <div class="shortcuts-row" style="margin-top:12px">
        <div class="shortcut"><span class="kbd">Leertaste</span> umdrehen</div>
        <div class="shortcut"><span class="kbd">→</span> richtig</div>
        <div class="shortcut"><span class="kbd">←</span> falsch</div>
      </div>
    </div>`;
}

function flipKarte() {
  isFlipped = !isFlipped;
  document.getElementById('karte-inner')?.classList.toggle('flipped', isFlipped);
}

function wertung(fachId, stapelId, richtig) {
  const k = lernKarten[lernIndex];
  if (richtig) {
    lernScore.richtig++;
    k.gelernt = true;
    // Update in original data
    const fach = data.faecher.find(f=>f.id===fachId);
    const stapel = fach?.stapel.find(s=>s.id===stapelId);
    const orig = stapel?.karten.find(c=>c.id===k.id);
    if (orig) orig.gelernt = true;
  } else {
    lernScore.falsch++;
  }
  lernIndex++;
  renderLernKarte(fachId, stapelId);
  buildSidebar();
}

function skipKarte(fachId, stapelId) { lernIndex++; renderLernKarte(fachId, stapelId); }
function prevKarte(fachId, stapelId) { if(lernIndex>0){lernIndex--;} renderLernKarte(fachId, stapelId); }

function renderErgebnis(fachId, stapelId) {
  const pct = lernKarten.length > 0 ? Math.round(lernScore.richtig/lernKarten.length*100) : 0;
  document.getElementById('content').innerHTML = `
    <div class="ergebnis-box fade-in">
      <div class="ergebnis-zahl">${pct}%</div>
      <div class="ergebnis-label">Richtige Antworten</div>
      <div class="ergebnis-row">
        <div class="stat-item" style="align-items:center">
          <div class="stat-val" style="color:var(--green);font-size:28px">${lernScore.richtig}</div>
          <div class="stat-lbl">Richtig</div>
        </div>
        <div class="stat-item" style="align-items:center">
          <div class="stat-val" style="color:var(--red);font-size:28px">${lernScore.falsch}</div>
          <div class="stat-lbl">Falsch</div>
        </div>
        <div class="stat-item" style="align-items:center">
          <div class="stat-val" style="font-size:28px">${lernKarten.length}</div>
          <div class="stat-lbl">Gesamt</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-ghost" onclick="showStapel('${fachId}','${stapelId}')">Zurück</button>
        <button class="btn btn-primary" onclick="startLernen('${fachId}','${stapelId}')">Nochmal lernen</button>
      </div>
    </div>`;
  updateTopbarStat();
}

// ══════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (currentView !== 'lernen') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); flipKarte(); }
  if (e.code === 'ArrowRight') document.querySelector('.btn-richtig')?.click();
  if (e.code === 'ArrowLeft') document.querySelector('.btn-falsch')?.click();
});

// ══════════════════════════════════════════════
// MODAL HELPERS
// ══════════════════════════════════════════════
function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); });
});

// ══════════════════════════════════════════════
// FACH ERSTELLEN
// ══════════════════════════════════════════════
function saveFach() {
  const name = document.getElementById('fach-name-input').value.trim();
  const icon = document.getElementById('fach-icon-input').value.trim() || '📖';
  if (!name) return;

  const newFach = {
    id: 'f' + Date.now(),
    name, farbe: selectedColor, icon,
    stapel: []
  };
  data.faecher.push(newFach);
  document.getElementById('fach-name-input').value = '';
  document.getElementById('fach-icon-input').value = '';
  closeModal('modal-fach');
  buildSidebar();
  showFach(newFach.id);
}

// ══════════════════════════════════════════════
// STAPEL ERSTELLEN
// ══════════════════════════════════════════════
function openAddStapelModal(fachId) {
  const select = document.getElementById('stapel-fach-select');
  select.innerHTML = data.faecher.map(f =>
    `<option value="${f.id}"${f.id===fachId?' selected':''}>${f.name}</option>`
  ).join('');
  document.getElementById('stapel-name-input').value = '';
  document.getElementById('stapel-desc-input').value = '';
  openModal('modal-stapel');
}

function saveStapel() {
  const name = document.getElementById('stapel-name-input').value.trim();
  const desc = document.getElementById('stapel-desc-input').value.trim();
  const fachId = document.getElementById('stapel-fach-select').value;
  if (!name) return;

  const fach = data.faecher.find(f=>f.id===fachId);
  const newStapel = {
    id: 's' + Date.now(),
    name, beschreibung: desc,
    erstellt: new Date().toISOString().split('T')[0],
    karten: []
  };
  fach.stapel.push(newStapel);
  closeModal('modal-stapel');
  buildSidebar();
  showStapel(fachId, newStapel.id);
}

// ══════════════════════════════════════════════
// KARTE ERSTELLEN / BEARBEITEN
// ══════════════════════════════════════════════
function openAddKarteModal(fachId, stapelId) {
  editKarteId = null;
  document.getElementById('modal-karte-title').textContent = 'Neue Karteikarte';
  document.getElementById('karte-frage-input').value = '';
  document.getElementById('karte-antwort-input').value = '';
  document.getElementById('karte-tags-input').value = '';
  document.getElementById('karte-schwierigkeit').value = '2';
  // Store context
  document.getElementById('modal-karte').dataset.fachId = fachId;
  document.getElementById('modal-karte').dataset.stapelId = stapelId;
  openModal('modal-karte');
}

function editKarte(fachId, stapelId, karteId) {
  const fach = data.faecher.find(f=>f.id===fachId);
  const stapel = fach?.stapel.find(s=>s.id===stapelId);
  const karte = stapel?.karten.find(k=>k.id===karteId);
  if (!karte) return;

  editKarteId = karteId;
  document.getElementById('modal-karte-title').textContent = 'Karte bearbeiten';
  document.getElementById('karte-frage-input').value = karte.frage;
  document.getElementById('karte-antwort-input').value = karte.antwort;
  document.getElementById('karte-tags-input').value = (karte.tags||[]).join(', ');
  document.getElementById('karte-schwierigkeit').value = karte.schwierigkeit || 2;
  document.getElementById('modal-karte').dataset.fachId = fachId;
  document.getElementById('modal-karte').dataset.stapelId = stapelId;
  openModal('modal-karte');
}

function saveKarte() {
  const fachId = document.getElementById('modal-karte').dataset.fachId;
  const stapelId = document.getElementById('modal-karte').dataset.stapelId;
  const fache = data.faecher.find(f=>f.id===fachId);
  const stapel = fache?.stapel.find(s=>s.id===stapelId);
  if (!stapel) return;

  const frage = document.getElementById('karte-frage-input').value.trim();
  const antwort = document.getElementById('karte-antwort-input').value.trim();
  const tagsRaw = document.getElementById('karte-tags-input').value.trim();
  const schwierigkeit = parseInt(document.getElementById('karte-schwierigkeit').value);
  if (!frage || !antwort) return;

  const tags = tagsRaw ? tagsRaw.split(',').map(t=>t.trim()).filter(Boolean) : [];

  if (editKarteId) {
    const karte = stapel.karten.find(k=>k.id===editKarteId);
    if (karte) { karte.frage=frage; karte.antwort=antwort; karte.tags=tags; karte.schwierigkeit=schwierigkeit; }
  } else {
    stapel.karten.push({
      id: 'k'+Date.now(), frage, antwort, tags, schwierigkeit, gelernt: false
    });
  }
  closeModal('modal-karte');
  buildSidebar();
  showStapel(fachId, stapelId);
}

// ══════════════════════════════════════════════
// START
// ══════════════════════════════════════════════
init();
</script>
